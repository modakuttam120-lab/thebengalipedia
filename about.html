<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>আমাদের সম্পর্কে | The Bengali Pedia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="dns-prefetch" href="https://picsum.photos"/>
<link rel="dns-prefetch" href="https://fonts.gstatic.com"/>
<link rel="stylesheet" href="styles.min.css"/>
<link rel="preload" as="script" href="perf.js"/>
<style>
.page-hero{background:linear-gradient(160deg,var(--ink) 0%,var(--ink-mid) 70%,var(--red-dark) 140%);color:#fff;padding:80px 0;text-align:center;position:relative;overflow:hidden}
.section{padding:60px 0}
.section-title{font-family:var(--font-display);font-size:clamp(24px,3.5vw,36px);font-weight:800;line-height:1.25;margin-bottom:22px}
.stats-band{background:var(--white);border-bottom:1px solid var(--border);padding:32px 0}
.stat-item{text-align:center}
.stat-num{font-family:var(--font-display);font-size:38px;font-weight:800;color:var(--ink);line-height:1}
.team-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:36px}
.team-img{width:80px;height:80px;border-radius:50%;overflow:hidden;margin:0 auto 14px;border:3px solid var(--border);aspect-ratio:1}
.team-img img{width:100%;height:100%;object-fit:cover}
@media(max-width:1024px){.team-grid{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.team-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="header-placeholder"></div>
<div class="page-hero">
  <div class="container" style="position:relative;z-index:1">
    <div class="page-hero-eyebrow">আমাদের সম্পর্কে</div>
    <h1 class="page-hero-title">বাংলা ভাষায় স্বাধীন সাংবাদিকতা</h1>
  </div>
</div>
<div class="stats-band">
  <div class="container">
    <div class="stat-item">
      <div class="stat-num">২.৪M+</div>
      <div class="stat-label">মাসিক পাঠক</div>
    </div>
  </div>
</div>
<div class="section" style="background:var(--white)">
  <div class="container">
    <h2 class="section-title">আমাদের লক্ষ্য</h2>
    <p>বিশ্বাসযোগ্য সংবাদই গণতন্ত্রের ভিত্তি। আমরা সেই ভিত্তি গড়তে প্রতিশ্রুতিবদ্ধ।</p>
  </div>
</div>
<div class="section" style="background:var(--paper)">
  <div class="container">
    <h2 class="section-title">আমাদের দল</h2>
    <div class="team-grid">
      <div class="team-card">
        <div class="team-img"><img src="https://picsum.photos/seed/av1/100/100" alt="দল সদস্য" loading="lazy"/></div>
        <div class="team-name">রহিম আহমেদ</div>
        <div class="team-role">প্রতিষ্ঠাতা এবং সম্পাদক</div>
      </div>
    </div>
  </div>
</div>
<div id="dynamic-footer"></div>
<a href="#" class="scroll-top" id="scrollTop">↑</a>
<script src="perf.js"></script>
</body>
</html>
