<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>লগইন | The Bengali Pedia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="dns-prefetch" href="https://fonts.gstatic.com"/>
<link rel="stylesheet" href="styles.min.css"/>
<link rel="preload" as="script" href="perf.js"/>
<style>
.masthead-mini{padding:20px 0;text-align:center}
.auth-wrap{min-height:calc(100vh - 90px);display:flex;align-items:center;justify-content:center;padding:20px}
.auth-split{display:grid;grid-template-columns:1fr 1fr;max-width:980px;width:100%;background:var(--white);border-radius:6px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.08)}
.auth-form{padding:44px 40px}
.form-group{margin-bottom:16px}
.form-label{font-family:var(--font-ui);font-size:12px;font-weight:600;color:var(--ink-mid);margin-bottom:6px;display:block}
.form-input{width:100%;border:1.5px solid var(--border);border-radius:3px;padding:11px 14px;font-family:var(--font-bn);font-size:14px;outline:0}
.form-input:focus{border-color:var(--red)}
.btn-submit{width:100%;background:var(--red);color:#fff;font-family:var(--font-ui);font-weight:700;font-size:14px;padding:13px;border-radius:3px;margin-bottom:18px;cursor:pointer;border:0}
.btn-submit:hover{background:var(--red-dark)}
@media(max-width:780px){.auth-split{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="masthead-mini">
  <a href="index.html" class="logo-name">The Bengali<span>Pedia</span></a>
</header>
<div class="auth-wrap">
  <div class="auth-split">
    <div class="auth-form">
      <div id="login-form">
        <div class="form-group">
          <label class="form-label">ইমেইল ঠিকানা</label>
          <input class="form-input" type="email" placeholder="you@example.com"/>
        </div>
        <div class="form-group">
          <label class="form-label">পাসওয়ার্ড</label>
          <input class="form-input" type="password" placeholder="••••••••"/>
        </div>
        <button class="btn-submit">লগইন করুন</button>
      </div>
    </div>
  </div>
</div>
<div id="dynamic-footer"></div>
<script src="perf.js"></script>
</body>
</html>
