<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>বিভাগ | The Bengali Pedia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="dns-prefetch" href="https://picsum.photos"/>
<link rel="dns-prefetch" href="https://fonts.gstatic.com"/>
<link rel="stylesheet" href="styles.min.css"/>
<link rel="preload" as="script" href="perf.js"/>
</head>
<body>
<div id="header-placeholder"></div>
<div class="container" style="padding: 40px 0;">
  <h1>বিভাগীয় সংবাদ</h1>
  <div class="grid-3" style="margin-top: 30px;">
    <div class="card">
      <div class="card-img"><img src="https://picsum.photos/seed/cat1/400/250" alt="রাজনীতি" loading="lazy"/></div>
      <div class="card-body">
        <h3 class="card-title">রাজনীতির সংবাদ</h3>
        <p class="card-excerpt">ভারতীয় রাজনীতির সর্বশেষ খবর এবং বিশ্লেষণ</p>
      </div>
    </div>
    <div class="card">
      <div class="card-img"><img src="https://picsum.photos/seed/cat2/400/250" alt="অর্থনীতি" loading="lazy"/></div>
      <div class="card-body">
        <h3 class="card-title">অর্থনীতি</h3>
        <p class="card-excerpt">বাজার, বিনিয়োগ এবং অর্থনৈতিক নীতি</p>
      </div>
    </div>
    <div class="card">
      <div class="card-img"><img src="https://picsum.photos/seed/cat3/400/250" alt="প্রযুক্তি" loading="lazy"/></div>
      <div class="card-body">
        <h3 class="card-title">প্রযুক্তি</h3>
        <p class="card-excerpt">AI, স্টার্টআপ এবং প্রযুক্তিগত উন্নয়ন</p>
      </div>
    </div>
  </div>
</div>
<div id="dynamic-footer"></div>
<a href="#" class="scroll-top" id="scrollTop">↑</a>
<script src="perf.js"></script>
</body>
</html>
